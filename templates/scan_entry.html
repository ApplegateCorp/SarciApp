<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scanner entr&eacute;e — RTM</title>
  <link rel="stylesheet" href="/static/css/style.css?v=3" />
  <style>
    .scan-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; background: var(--charcoal);
    }
    .scan-topbar a {
      color: rgba(255,255,255,0.6); text-decoration: none; font-size: 0.88rem;
      font-family: 'Roboto', sans-serif;
    }
    .scan-topbar a:hover { color: #fff; }
    .scan-topbar span {
      color: #fff; font-family: 'Roboto', sans-serif; font-weight: 700; font-size: 1.05rem;
    }
  </style>
</head>
<body>
  <div class="scan-topbar">
    <a href="/">&larr; Retour</a>
    <span>Contr&ocirc;le entr&eacute;es</span>
    <a href="/logout">D&eacute;connexion</a>
  </div>
  <main class="container">
    <h1>Contr&ocirc;le entr&eacute;es</h1>

    <div id="result-box" class="result-box hidden"></div>

    <div class="scanner-container">
      <div id="reader"></div>
      <button id="start-btn" class="btn-primary btn-full" onclick="startScanner()">D&eacute;marrer le scanner</button>
      <button id="stop-btn" class="btn-outline btn-full hidden" onclick="stopScanner()">Arr&ecirc;ter</button>
    </div>

    <details class="manual-entry">
      <summary>Saisie manuelle</summary>
      <form id="manual-form" class="card-form" style="margin-top:12px">
        <label>Token QR
          <input type="text" id="manual-token" placeholder="Collez le token ici" />
        </label>
        <button type="submit" class="btn-primary btn-full">Valider</button>
      </form>
    </details>
  </main>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script>
    let scanner = null;

    function showResult(ok, message) {
      const box = document.getElementById('result-box');
      box.className = 'result-box ' + (ok ? 'result-ok' : 'result-error');
      box.textContent = message;
      box.classList.remove('hidden');
      setTimeout(() => box.classList.add('hidden'), 5000);
    }

    async function validateToken(token) {
      const form = new FormData();
      form.append('token', token);
      const res = await fetch('/scanner/validate-entry', { method: 'POST', body: form });
      const data = await res.json();
      showResult(data.ok, data.ok ? data.message : data.error);
    }

    function startScanner() {
      document.getElementById('start-btn').classList.add('hidden');
      document.getElementById('stop-btn').classList.remove('hidden');
      scanner = new Html5Qrcode("reader");
      scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        (decodedText) => {
          const match = decodedText.match(/\/(?:admin\/)?scan\/([a-f0-9-]+)/);
          const token = match ? match[1] : decodedText;
          stopScanner();
          validateToken(token);
        },
        () => {}
      );
    }

    function stopScanner() {
      if (scanner) { scanner.stop().catch(() => {}); scanner = null; }
      document.getElementById('start-btn').classList.remove('hidden');
      document.getElementById('stop-btn').classList.add('hidden');
    }

    document.getElementById('manual-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const token = document.getElementById('manual-token').value.trim();
      if (token) validateToken(token);
    });
  </script>
</body>
</html>
