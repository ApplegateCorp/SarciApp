<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Admin{% endblock %} — RTM</title>
  <link rel="stylesheet" href="/static/css/style.css?v=3" />
  <style>
    /* ── Admin pill nav ──────────────────────────────────── */
    .admin-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: var(--charcoal);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .admin-topbar-brand {
      font-family: 'Roboto', sans-serif;
      font-weight: 900;
      font-size: 1.05rem;
      color: #fff;
      text-decoration: none;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .admin-topbar-brand:hover { color: #fff; text-decoration: none; }
    .admin-topbar-right {
      display: flex;
      gap: 14px;
      align-items: center;
      font-size: 0.85rem;
    }
    .admin-topbar-right a { color: rgba(255,255,255,0.6); text-decoration: none; }
    .admin-topbar-right a:hover { color: #fff; text-decoration: none; }

    .pill-nav-wrapper {
      background: var(--surface);
      border-bottom: 1.5px solid var(--border);
      padding: 10px 16px;
      position: sticky;
      top: 50px;
      z-index: 99;
    }
    .pill-nav {
      display: flex;
      align-items: center;
      gap: 4px;
      max-width: 720px;
      margin: 0 auto;
      background: var(--bg);
      border-radius: 50px;
      padding: 4px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .pill-nav::-webkit-scrollbar { display: none; }
    .pill-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 50px;
      font-size: 0.82rem;
      font-weight: 500;
      font-family: 'Roboto', sans-serif;
      color: var(--text-muted);
      text-decoration: none;
      white-space: nowrap;
      transition: all 0.18s;
      cursor: pointer;
    }
    .pill-item:hover {
      color: var(--text);
      background: var(--surface2);
      text-decoration: none;
    }
    .pill-item.active {
      background: var(--surface);
      color: var(--text);
      font-weight: 600;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .pill-icon {
      font-size: 0.9rem;
      line-height: 1;
    }

    @media (max-width: 600px) {
      .pill-item { padding: 7px 12px; font-size: 0.78rem; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

  <!-- Top bar -->
  <div class="admin-topbar">
    <a href="/admin/dashboard" class="admin-topbar-brand">RTM Admin</a>
    <div class="admin-topbar-right">
      <a href="/">Site</a>
      <a href="/logout">D&eacute;connexion</a>
    </div>
  </div>

  <!-- Pill navigation -->
  <div class="pill-nav-wrapper">
    <nav class="pill-nav">
      <a href="/admin/dashboard" class="pill-item {% if active_tab == 'dashboard' %}active{% endif %}">
        <span class="pill-icon">&#x1F3E0;</span> Accueil
      </a>
      <a href="/admin/accounts" class="pill-item {% if active_tab == 'accounts' %}active{% endif %}">
        <span class="pill-icon">&#x1F465;</span> Comptes
      </a>
      <a href="/admin/analytics" class="pill-item {% if active_tab == 'analytics' %}active{% endif %}">
        <span class="pill-icon">&#x1F4CA;</span> Analytics
      </a>
      <a href="/admin/bar" class="pill-item {% if active_tab == 'bar' %}active{% endif %}">
        <span class="pill-icon">&#x1F37A;</span> Bar
      </a>
      <a href="/admin/entry" class="pill-item {% if active_tab == 'entry' %}active{% endif %}">
        <span class="pill-icon">&#x1F4F7;</span> Scanner
      </a>
      <a href="/admin/drinks" class="pill-item {% if active_tab == 'drinks' %}active{% endif %}">
        <span class="pill-icon">&#x1F4CB;</span> Boissons
      </a>
      <a href="/admin/bartenders" class="pill-item {% if active_tab == 'team' %}active{% endif %}">
        <span class="pill-icon">&#x1F46A;</span> &Eacute;quipe
      </a>
      <a href="/admin/fix-transactions" class="pill-item {% if active_tab == 'tools' %}active{% endif %}">
        <span class="pill-icon">&#x1F527;</span> Outils
      </a>
    </nav>
  </div>

  <main class="container" style="max-width:{% block max_width %}720px{% endblock %};">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
