<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bar — Festival</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <nav class="navbar">
    <a href="/admin/dashboard" class="nav-brand">← Dashboard</a>
    <span class="nav-brand">🍺 Bar</span>
  </nav>
  <main class="container">

    <div id="result-box" class="result-box hidden"></div>

    <!-- Step 1: Select drinks -->
    <div id="step-drinks">
      <h2>1. Sélectionner les boissons</h2>
      <div class="drinks-grid">
        {% for drink in drinks %}
        <button class="drink-btn" data-id="{{ drink.id }}" data-name="{{ drink.name }}" data-price="{{ drink.price_cents }}" onclick="addDrink(this)">
          <span class="drink-emoji">{{ drink.emoji }}</span>
          <span class="drink-name">{{ drink.name }}</span>
          <span class="drink-price">{{ "%.2f"|format(drink.price_cents / 100) }} €</span>
        </button>
        {% endfor %}
      </div>

      <div id="order-summary" class="order-summary hidden">
        <h3>Commande</h3>
        <div id="order-items"></div>
        <div class="order-total">
          Total : <strong id="order-total">0.00 €</strong>
        </div>
        <div class="order-actions">
          <button class="btn-outline" onclick="clearOrder()">Annuler</button>
          <button class="btn-primary" onclick="goToScan()">Scanner le QR →</button>
        </div>
      </div>
    </div>

    <!-- Step 2: Scan QR -->
    <div id="step-scan" class="hidden">
      <h2>2. Scanner le QR code du client</h2>
      <div id="bar-reader"></div>
      <button class="btn-primary btn-full" onclick="startBarScanner()">Démarrer le scanner</button>
      <button class="btn-outline btn-full" onclick="backToDrinks()" style="margin-top:8px">← Retour</button>

      <details class="manual-entry" style="margin-top:16px">
        <summary>Saisie manuelle</summary>
        <form id="bar-manual-form" class="card-form" style="margin-top:12px">
          <input type="text" id="bar-manual-token" placeholder="Token QR" />
          <button type="submit" class="btn-primary btn-full">Valider</button>
        </form>
      </details>
    </div>

  </main>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script>
    // Order state
    let order = {}; // { drink_id: { name, price_cents, qty } }
    let barScanner = null;

    function addDrink(btn) {
      const id = btn.dataset.id;
      if (order[id]) {
        order[id].qty += 1;
      } else {
        order[id] = { name: btn.dataset.name, price_cents: parseInt(btn.dataset.price), qty: 1 };
      }
      renderOrder();
    }

    function removeDrink(id) {
      if (order[id]) {
        order[id].qty -= 1;
        if (order[id].qty <= 0) delete order[id];
      }
      renderOrder();
    }

    function clearOrder() {
      order = {};
      renderOrder();
    }

    function renderOrder() {
      const items = Object.entries(order);
      const summary = document.getElementById('order-summary');
      const itemsEl = document.getElementById('order-items');
      const totalEl = document.getElementById('order-total');

      if (items.length === 0) {
        summary.classList.add('hidden');
        return;
      }

      summary.classList.remove('hidden');
      let total = 0;
      itemsEl.innerHTML = items.map(([id, item]) => {
        const subtotal = item.price_cents * item.qty;
        total += subtotal;
        return `<div class="order-item">
          <span>${item.qty}x ${item.name}</span>
          <span>
            ${(subtotal / 100).toFixed(2)} €
            <button onclick="removeDrink('${id}')" class="remove-btn">−</button>
          </span>
        </div>`;
      }).join('');
      totalEl.textContent = (total / 100).toFixed(2) + ' €';
    }

    function goToScan() {
      if (Object.keys(order).length === 0) return;
      document.getElementById('step-drinks').classList.add('hidden');
      document.getElementById('step-scan').classList.remove('hidden');
    }

    function backToDrinks() {
      stopBarScanner();
      document.getElementById('step-scan').classList.add('hidden');
      document.getElementById('step-drinks').classList.remove('hidden');
    }

    function showResult(ok, message) {
      const box = document.getElementById('result-box');
      box.className = 'result-box ' + (ok ? 'result-ok' : 'result-error');
      box.textContent = message;
      box.classList.remove('hidden');
      if (ok) {
        clearOrder();
        backToDrinks();
      }
      setTimeout(() => box.classList.add('hidden'), 6000);
    }

    async function chargeToken(token) {
      const drinkIds = [];
      for (const [id, item] of Object.entries(order)) {
        for (let i = 0; i < item.qty; i++) drinkIds.push(parseInt(id));
      }
      const res = await fetch('/admin/charge', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, drink_ids: drinkIds }),
      });
      const data = await res.json();
      showResult(data.ok, data.ok
        ? `✅ ${data.message}\nSolde restant : ${data.new_balance.toFixed(2)} €`
        : `❌ ${data.error}`
      );
    }

    function startBarScanner() {
      barScanner = new Html5Qrcode("bar-reader");
      barScanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        (decodedText) => {
          const match = decodedText.match(/\/admin\/scan\/([a-f0-9-]+)/);
          const token = match ? match[1] : decodedText;
          stopBarScanner();
          chargeToken(token);
        },
        () => {}
      );
    }

    function stopBarScanner() {
      if (barScanner) {
        barScanner.stop().catch(() => {});
        barScanner = null;
      }
    }

    document.getElementById('bar-manual-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const token = document.getElementById('bar-manual-token').value.trim();
      if (token) chargeToken(token);
    });
  </script>
</body>
</html>
